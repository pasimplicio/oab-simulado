<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Autenticando…</title>
  <script src="js/env.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js?v=2"></script>
  <script>
    // Supabase detecta o token da URL (detectSessionInUrl: true) e grava no storage.
    // Aguarda 800ms para garantir que o storage foi atualizado antes de fechar.
    setTimeout(function () {
      try { window.close(); } catch (e) {}
    }, 800);
  </script>
</head>
<body style="background:#07111f;color:#8899aa;display:flex;align-items:center;
             justify-content:center;height:100vh;margin:0;
             font-family:system-ui,sans-serif;font-size:.9rem;text-align:center;">
  <div>
    <div style="width:24px;height:24px;border:3px solid rgba(255,255,255,.1);
                border-top-color:#00b4d8;border-radius:50%;
                animation:sp .7s linear infinite;margin:0 auto 14px;"></div>
    <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
    Autenticando… esta janela fechará automaticamente.
  </div>
</body>
</html>
